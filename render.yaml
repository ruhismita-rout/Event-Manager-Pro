services:
  - type: web
    name: eventflow-app
    runtime: node
    plan: free
    region: singapore
    buildCommand: corepack enable && corepack prepare pnpm@10.17.0 --activate && pnpm install --frozen-lockfile && pnpm --filter @workspace/eventflow run build && pnpm --filter @workspace/api-server run build
    preDeployCommand: corepack enable && corepack prepare pnpm@10.17.0 --activate && pnpm --filter @workspace/db run push
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 24.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: eventflow-db
          property: connectionString
      - key: LOG_LEVEL
        value: info
      - key: STREAM_TWITCH_PARENT
        sync: false
      - key: STREAM_URL_TEMPLATE
        sync: false
      - key: STREAM_DEFAULT_URL
        sync: false

databases:
  - name: eventflow-db
    plan: free
    region: singapore
